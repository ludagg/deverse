<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#08130f"/>
  <!-- pixel globe: neon-green sphere outline + meridians on a dark CRT field -->
  <g fill="#39d353">
    <rect x="5" y="1" width="6" height="1"/>
    <rect x="3" y="2" width="2" height="1"/><rect x="11" y="2" width="2" height="1"/>
    <rect x="2" y="3" width="1" height="1"/><rect x="13" y="3" width="1" height="1"/>
    <rect x="2" y="4" width="1" height="1"/><rect x="13" y="4" width="1" height="1"/>
    <rect x="1" y="5" width="1" height="1"/><rect x="14" y="5" width="1" height="1"/>
    <rect x="1" y="6" width="1" height="1"/><rect x="14" y="6" width="1" height="1"/>
    <rect x="1" y="7" width="14" height="1"/>
    <rect x="1" y="9" width="1" height="1"/><rect x="14" y="9" width="1" height="1"/>
    <rect x="1" y="10" width="1" height="1"/><rect x="14" y="10" width="1" height="1"/>
    <rect x="2" y="11" width="1" height="1"/><rect x="13" y="11" width="1" height="1"/>
    <rect x="2" y="12" width="1" height="1"/><rect x="13" y="12" width="1" height="1"/>
    <rect x="3" y="13" width="2" height="1"/><rect x="11" y="13" width="2" height="1"/>
    <rect x="5" y="14" width="6" height="1"/>
  </g>
  <!-- meridian -->
  <g fill="#2dd4bf">
    <rect x="7" y="2" width="2" height="1"/><rect x="7" y="13" width="2" height="1"/>
    <rect x="6" y="4" width="1" height="1"/><rect x="9" y="4" width="1" height="1"/>
    <rect x="6" y="10" width="1" height="1"/><rect x="9" y="10" width="1" height="1"/>
    <rect x="5" y="6" width="1" height="1"/><rect x="10" y="6" width="1" height="1"/>
    <rect x="5" y="8" width="1" height="1"/><rect x="10" y="8" width="1" height="1"/>
  </g>
</svg>
