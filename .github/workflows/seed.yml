name: Seed developers

# Manually-triggered: populates the database with real GitHub developers.
# Setup: add a repository secret DATABASE_URL (your Supabase POOLED connection
# string). The GitHub token is the one Actions provides automatically — no PAT
# needed — unless you add SEED_GITHUB_TOKEN to raise the rate limit.
on:
  workflow_dispatch:
    inputs:
      per_city:
        description: "Developers to fetch per city"
        default: "6"

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Seed
        run: npm run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.SEED_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          SEED_PER_CITY: ${{ inputs.per_city }}
